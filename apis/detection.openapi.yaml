openapi: 3.1.0
info:
  title: Tuor Detection Service (Fathom platform API)
  version: 0.2.0+sprint3
  description: |
    Tuor product capability (PCD v3 §6.7) exposed via the Fathom platform API
    surface (PCD v3 §6.5).

    Classical line detection: TPSW two-pass normalization → persistence-filtered
    peak detection → optional cluster-merge (Sprint 3) → line-of-interest
    reporting in operationally-shaped format (Method A in PCD v3 §6.7). Phase 0
    has no running HTTP server; this spec documents the contract that
    `src/fathom/detection/lines.py` implements and that Phase 1+ external API
    surface will derive from.

    Phase 1 adds ML-based detection (Method B) plus the measured
    agreement-confidence calibration between classical and ML methods.
    Calibrated uncertainty (deep ensemble + conformal prediction; PCD v3 §5.1,
    platform-layer) populates the `confidence` field; Sprint 3 leaves it null
    pending Phase 1 calibration.
  contact:
    name: Ulmo
servers:
  - url: http://localhost:8000
    description: Placeholder. Phase 0 runs single-process; the spec documents
                 the eventual contract.
tags:
  - name: detection
    description: Line-of-interest detection.
paths:
  /detect/lines:
    post:
      operationId: detectLines
      tags: [detection]
      summary: Detect lines of interest on a generated LOFAR gram.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRequest"
      responses:
        "200":
          description: Detected lines of interest.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LineOfInterest"
components:
  schemas:
    DetectionRequest:
      type: object
      required: [gram_artifact_path, array_id]
      properties:
        gram_artifact_path:
          type: string
          description: Path to a previously-generated LOFAR gram artifact.
        array_id:
          type: string
        beam_id:
          type: [string, "null"]
        method:
          type: string
          enum: [classical, ml, fused]
          default: classical
          description: Detection method. `classical` is the Sprint 2/3 deliverable;
                       `ml` and `fused` arrive in Phase 1.
    LineOfInterest:
      type: object
      required:
        - correlation_id
        - array_id
        - timestamp
        - frequency_hz
        - snr_db
        - persistence_s
        - detection_method
      properties:
        correlation_id:
          type: string
        array_id:
          type: string
        beam_id:
          type: [string, "null"]
        timestamp:
          type: string
          format: date-time
        frequency_hz:
          type: number
          format: float
        bandwidth_hz:
          type: [number, "null"]
          format: float
        snr_db:
          type: number
          format: float
        persistence_s:
          type: number
          format: float
        detection_method:
          type: string
          enum: [classical, ml, fused]
        confidence:
          type: [number, "null"]
          format: float
          description: Calibrated confidence (deep ensemble + conformal prediction;
                       Phase 1 populates, Sprint 2/3 leaves null).

openapi: 3.1.0
info:
  title: Fathom Detection Service
  version: 0.1.0+sprint2
  description: |
    Sprint 2 deliverable.

    Classical line detection: TPSW two-pass normalization → persistence-filtered
    peak detection → line-of-interest reporting in operationally-shaped format
    (PCD v2 §6.3 Method A; Sprint2_Plan §3). Phase 0 has no running HTTP server;
    this spec documents the contract that `src/fathom/detection/lines.py`
    implements and that Phase 1+ external API surface will derive from.

    Phase 1 will add ML-based detection (Method B) and the measured
    agreement-confidence calibration between classical and ML methods. Calibrated
    uncertainty (deep ensemble + conformal prediction; PCD v2 §5.1) populates the
    `confidence` field; Sprint 2 leaves it null.
  contact:
    name: Ulmo
servers:
  - url: http://localhost:8000
    description: Placeholder. Phase 0 runs single-process; the spec documents
                 the eventual contract.
tags:
  - name: detection
    description: Line-of-interest detection.
paths:
  /detect/lines:
    post:
      operationId: detectLines
      tags: [detection]
      summary: Detect lines of interest on a generated LOFAR gram.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRequest"
      responses:
        "200":
          description: Detected lines of interest.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LineOfInterest"
components:
  schemas:
    DetectionRequest:
      type: object
      required: [gram_artifact_path, array_id]
      properties:
        gram_artifact_path:
          type: string
          description: Path to a previously-generated LOFAR gram artifact.
        array_id:
          type: string
        beam_id:
          type: [string, "null"]
        method:
          type: string
          enum: [classical, ml, fused]
          default: classical
          description: Detection method. `classical` is the Sprint 2 deliverable;
                       `ml` and `fused` arrive in Phase 1.
    LineOfInterest:
      type: object
      required:
        - correlation_id
        - array_id
        - timestamp
        - frequency_hz
        - snr_db
        - persistence_s
        - detection_method
      properties:
        correlation_id:
          type: string
        array_id:
          type: string
        beam_id:
          type: [string, "null"]
        timestamp:
          type: string
          format: date-time
        frequency_hz:
          type: number
          format: float
        bandwidth_hz:
          type: [number, "null"]
          format: float
        snr_db:
          type: number
          format: float
        persistence_s:
          type: number
          format: float
        detection_method:
          type: string
          enum: [classical, ml, fused]
        confidence:
          type: [number, "null"]
          format: float
          description: Calibrated confidence (deep ensemble + conformal prediction;
                       Phase 1 populates, Sprint 2 leaves null).
